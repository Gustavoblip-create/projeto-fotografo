<!doctype html>
<html>

<head>
  <title>Contato - Curso de Fotografia</title>
  <meta name="description" content="Acesse o curso de Fotografia para profissionais" />
  <meta name="keywords" content="curso, fotografia, senac" />
  <meta name="author" content="Edson Rodrigues" />
  <link rel="stylesheet" href="CSS/main.css">


</head>

<body>
  <header>
    <div id="barra-cabecalho">
      <h1>Curso de Fotografia Profissional</h1>
      <p>
        Descubra como capturar momentos únicos e transformarsua paixão por
        fotografia em uma carreira inspiradora!
      </p>
    </div>
    <div id="navbar-menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="conteudo.html">Conteúdo</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </div>
  </header>
  <main>
    <h2>Contato</h2>
    <form action="contato.html" method="post" enctype="multipart/form-data">
      <div>
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required maxlength="60" minlength="5" />


      </div>

      <div>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="Digite seu E-mail" required />
      </div>
      <div>

        <div>
          <label for="senha">Senha</label>
          <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required />

        </div>

        <div>
          <label for="telefone">Telefone</label>
          <input type="tel" name="telefone" id="telefone" placeholder="(00)0000-0000" required />
        </div>
      </div>

      <div>
        <label for="data_nasc">Data Nascimento</label>
        <input type="date" name="data_nasc" id="data_nasc" />
      </div>

      <div>
        <label for="idade">Idade</label>
        <input type="number" name="idade" id="Idade" min="0" max="130" />
      </div>

      <div>
        <label for="cor">Cor</label>
        <input type="color" name="cor" id="cor" min="0" max="130" />
      </div>

      <div>
        <label for="arquivo">Arquivo</label>
        <input type="file" name="arquivo" id="arquivo" />
      </div>

      <div>
        <label for="Volume">Volume</label>
        <input type="range" name="Volume" id="Volume" min="0" max="100" />
      </div>

      <div>
        <label for="curso">curso</label>
        <select name="curso">
          <option disabled selected>Selecione o Curso</option>
          <option valule="Fotografia">Fotografia</option>
          <option valule="Desing">Desing</option>
          <option valule="Marketing">Marketing</option>
        </select>

      </div>
      <fieldset>
        <legend>Interesse</legend>
        <div>
          <label>
            <input type="checkbox" name="Interesse"[] />Fotografia</label>
            <input type="checkbox" name="Interesse"[]/>Video</label>
            <input type="checkbox" name="Interesse"[] />Edição</label>
        </div>
        </fieldset>

        <fieldset>

          <legend>Gênero</legend>
          <div>
            <label><input type="radio" name="genero" />Masculino</label>
            <label><input type="radio" name="genero"/>Feminino</label>
            <label><input type="radio" name="genero"/>Não-Binário</label>
            <label><input type="radio" name="genero"/>Prefiro não informar</label>
          </div>
        </fieldset> 

        <div>
          <label for="mensagem">Mensagem</label><br />
          <textarea name="mensagem" id="mensagem" rows="10" cols="50"></textarea>
        </div>

      <div>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </div>
    </form>

  </main>
  <footer id="rodape">
    <p>&copy; 2026 Senac Marília - Todos os direitos são reservados</p>
  </footer>
</body>

</html>
